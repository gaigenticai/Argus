[pytest]
testpaths = tests
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
addopts = -ra --strict-markers --strict-config
markers =
    db: tests that require a real Postgres database
    integration: end-to-end tests against a running stack
filterwarnings =
    ignore::DeprecationWarning:pydantic.*
    ignore::DeprecationWarning:passlib.*
    # Audit D1 — sync helper tests under module-level pytestmark trip a
    # PytestWarning. Suppress: the alternative (split modules) is more churn
    # for less value, and these warnings are harmless.
    ignore:.*marked with .@pytest.mark.asyncio. but it is not an async function.*:pytest.PytestWarning
