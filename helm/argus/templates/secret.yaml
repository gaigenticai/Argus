{{- /*
Helm-side guards against the OWASP A05:2021 default-credentials class
issue. Each secret below MUST be overridden in values.yaml (or a
Helm --set). If any retains its placeholder value, ``helm install``
fails fast instead of producing a cluster with known default JWT /
DB / Meili / MinIO secrets.
*/ -}}
{{- if hasPrefix "CHANGE_ME_" .Values.argus.jwtSecret -}}
{{- fail "argus.jwtSecret is unset — provide a real 32+ char value via --set argus.jwtSecret=... or values override" -}}
{{- end -}}
{{- if hasPrefix "CHANGE_ME_" .Values.postgres.password -}}
{{- fail "postgres.password is unset — pin from your secret manager via --set postgres.password=..." -}}
{{- end -}}
{{- if hasPrefix "CHANGE_ME_" .Values.meilisearch.masterKey -}}
{{- fail "meilisearch.masterKey is unset — pin from your secret manager via --set meilisearch.masterKey=..." -}}
{{- end -}}
{{- if hasPrefix "CHANGE_ME_" .Values.evidence.rootPassword -}}
{{- fail "evidence.rootPassword is unset — pin from your secret manager via --set evidence.rootPassword=..." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "argus.fullname" . }}-config
  labels: {{- include "argus.labels" . | nindent 4 }}
type: Opaque
stringData:
  # ── Core ────────────────────────────────────────────────────────
  ARGUS_JWT_SECRET: {{ .Values.argus.jwtSecret | quote }}

  # ── Bootstrap users (P1 #1.8) ───────────────────────────────────
  ARGUS_BOOTSTRAP_ADMIN_EMAIL:    {{ .Values.argus.bootstrapAdmin.email | quote }}
  ARGUS_BOOTSTRAP_ADMIN_PASSWORD: {{ .Values.argus.bootstrapAdmin.password | quote }}
  ARGUS_BOOTSTRAP_ANALYST_EMAIL:    {{ .Values.argus.bootstrapAnalyst.email | quote }}
  ARGUS_BOOTSTRAP_ANALYST_PASSWORD: {{ .Values.argus.bootstrapAnalyst.password | quote }}

  # ── Tenant locale (P1 #1.2) ─────────────────────────────────────
  ARGUS_DEFAULT_TIMEZONE: {{ .Values.argus.locale.timezone | quote }}
  ARGUS_DEFAULT_CALENDAR: {{ .Values.argus.locale.calendar | quote }}

  # ── Postgres ────────────────────────────────────────────────────
  ARGUS_DB_HOST: {{ include "argus.postgresHost" . | quote }}
  ARGUS_DB_PORT: {{ .Values.postgres.external.port | default 5432 | quote }}
  ARGUS_DB_NAME: {{ .Values.postgres.database | quote }}
  ARGUS_DB_USER: {{ .Values.postgres.username | quote }}
  ARGUS_DB_PASSWORD: {{ .Values.postgres.password | quote }}

  # ── Redis ───────────────────────────────────────────────────────
  ARGUS_REDIS_URL: {{ include "argus.redisUrl" . | quote }}

  # ── Meilisearch ─────────────────────────────────────────────────
  MEILI_MASTER_KEY: {{ .Values.meilisearch.masterKey | quote }}

  # ── Evidence Vault ──────────────────────────────────────────────
  {{- if .Values.evidence.enabled }}
  ARGUS_EVIDENCE_ENDPOINT_URL: "http://{{ include "argus.fullname" . }}-evidence:9000"
  ARGUS_EVIDENCE_BUCKET: {{ .Values.evidence.bucket | quote }}
  ARGUS_EVIDENCE_ACCESS_KEY: {{ .Values.evidence.rootUser | quote }}
  ARGUS_EVIDENCE_SECRET_KEY: {{ .Values.evidence.rootPassword | quote }}
  MINIO_ROOT_USER: {{ .Values.evidence.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.evidence.rootPassword | quote }}
  {{- else }}
  ARGUS_EVIDENCE_ENDPOINT_URL: {{ .Values.evidence.external.endpoint | quote }}
  ARGUS_EVIDENCE_REGION:       {{ .Values.evidence.external.region   | quote }}
  ARGUS_EVIDENCE_BUCKET:       {{ .Values.evidence.external.bucket   | quote }}
  ARGUS_EVIDENCE_ACCESS_KEY:   {{ .Values.evidence.external.accessKey | quote }}
  ARGUS_EVIDENCE_SECRET_KEY:   {{ .Values.evidence.external.secretKey | quote }}
  {{- end }}

  # ── LLM (only when ollama disabled) ─────────────────────────────
  {{- if not .Values.ollama.enabled }}
  ARGUS_LLM_PROVIDER: {{ .Values.llm.provider | quote }}
  ARGUS_LLM_API_KEY:  {{ .Values.llm.apiKey   | quote }}
  ARGUS_LLM_BASE_URL: {{ .Values.llm.baseUrl  | quote }}
  ARGUS_LLM_MODEL:    {{ .Values.llm.model    | quote }}
  {{- else }}
  ARGUS_LLM_PROVIDER: "ollama"
  ARGUS_LLM_OLLAMA_HOST: "http://{{ include "argus.fullname" . }}-ollama:11434"
  ARGUS_LLM_MODEL: {{ .Values.ollama.model | quote }}
  {{- end }}

  # ── Phase 3 connector secrets (all opt-in / BYOK) ───────────────
  # Empty string means "not configured"; the connector's
  # is_configured() returns False and entry-points no-op cleanly.

  # EDR (P3 #3.2)
  ARGUS_FALCON_CLIENT_ID:     {{ .Values.argus.connectors.crowdstrike.clientId     | default "" | quote }}
  ARGUS_FALCON_CLIENT_SECRET: {{ .Values.argus.connectors.crowdstrike.clientSecret | default "" | quote }}
  ARGUS_FALCON_BASE_URL:      {{ .Values.argus.connectors.crowdstrike.baseUrl      | default "https://api.crowdstrike.com" | quote }}
  ARGUS_S1_API_TOKEN:         {{ .Values.argus.connectors.sentinelone.apiToken     | default "" | quote }}
  ARGUS_S1_BASE_URL:          {{ .Values.argus.connectors.sentinelone.baseUrl      | default "" | quote }}
  ARGUS_MDE_TENANT_ID:        {{ .Values.argus.connectors.mde.tenantId             | default "" | quote }}
  ARGUS_MDE_CLIENT_ID:        {{ .Values.argus.connectors.mde.clientId             | default "" | quote }}
  ARGUS_MDE_CLIENT_SECRET:    {{ .Values.argus.connectors.mde.clientSecret         | default "" | quote }}

  # Email gateway (P3 #3.3)
  ARGUS_PROOFPOINT_PRINCIPAL: {{ .Values.argus.connectors.proofpoint.principal     | default "" | quote }}
  ARGUS_PROOFPOINT_SECRET:    {{ .Values.argus.connectors.proofpoint.secret        | default "" | quote }}
  ARGUS_MIMECAST_BASE_URL:    {{ .Values.argus.connectors.mimecast.baseUrl         | default "" | quote }}
  ARGUS_MIMECAST_APP_ID:      {{ .Values.argus.connectors.mimecast.appId           | default "" | quote }}
  ARGUS_MIMECAST_APP_KEY:     {{ .Values.argus.connectors.mimecast.appKey          | default "" | quote }}
  ARGUS_MIMECAST_ACCESS_KEY:  {{ .Values.argus.connectors.mimecast.accessKey       | default "" | quote }}
  ARGUS_MIMECAST_SECRET_KEY:  {{ .Values.argus.connectors.mimecast.secretKey       | default "" | quote }}
  ARGUS_ABNORMAL_TOKEN:       {{ .Values.argus.connectors.abnormal.token           | default "" | quote }}

  # Sandbox (P3 #3.6) — all BYOK except CAPE which is operator-self-hosted
  ARGUS_CAPE_URL:             {{ .Values.argus.connectors.cape.url                 | default "" | quote }}
  ARGUS_CAPE_API_KEY:         {{ .Values.argus.connectors.cape.apiKey              | default "" | quote }}
  ARGUS_JOE_API_KEY:          {{ .Values.argus.connectors.joeSandbox.apiKey        | default "" | quote }}
  ARGUS_HYBRID_API_KEY:       {{ .Values.argus.connectors.hybridAnalysis.apiKey    | default "" | quote }}
  ARGUS_VT_API_KEY:           {{ .Values.argus.connectors.virustotal.apiKey        | default "" | quote }}
  ARGUS_VT_ENTERPRISE:        {{ .Values.argus.connectors.virustotal.enterprise    | default "false" | quote }}

  # SOAR (P3 #3.7)
  ARGUS_XSOAR_URL:            {{ .Values.argus.connectors.xsoar.url                | default "" | quote }}
  ARGUS_XSOAR_API_KEY:        {{ .Values.argus.connectors.xsoar.apiKey             | default "" | quote }}
  ARGUS_TINES_WEBHOOK_URL:    {{ .Values.argus.connectors.tines.webhookUrl         | default "" | quote }}
  ARGUS_SPLUNK_SOAR_URL:      {{ .Values.argus.connectors.splunkSoar.url           | default "" | quote }}
  ARGUS_SPLUNK_SOAR_TOKEN:    {{ .Values.argus.connectors.splunkSoar.token         | default "" | quote }}

  # Forensics (P3 #3.11) — opt-in CLI / API
  ARGUS_VOLATILITY_CLI:          {{ .Values.argus.connectors.volatility.cli           | default "" | quote }}
  ARGUS_VELOCIRAPTOR_URL:        {{ .Values.argus.connectors.velociraptor.url         | default "" | quote }}
  ARGUS_VELOCIRAPTOR_TOKEN:      {{ .Values.argus.connectors.velociraptor.token       | default "" | quote }}
  ARGUS_VELOCIRAPTOR_VERIFY_SSL: {{ .Values.argus.connectors.velociraptor.verifySsl   | default "true" | quote }}

  # Breach providers (P3 #3.9)
  ARGUS_HIBP_API_KEY:         {{ .Values.argus.connectors.hibp.apiKey              | default "" | quote }}
  ARGUS_INTELX_API_KEY:       {{ .Values.argus.connectors.intelx.apiKey            | default "" | quote }}
  ARGUS_DEHASHED_API_KEY:     {{ .Values.argus.connectors.dehashed.apiKey          | default "" | quote }}

  # Adversary emulation (P3 #3.5)
  ARGUS_ATOMIC_RED_TEAM_PATH: {{ .Values.argus.connectors.atomicRedTeam.path       | default "" | quote }}
  ARGUS_CALDERA_URL:          {{ .Values.argus.connectors.caldera.url              | default "" | quote }}
  ARGUS_CALDERA_API_KEY:      {{ .Values.argus.connectors.caldera.apiKey           | default "" | quote }}

  # Telegram MTProto collector (P3 #3.10) — gated behind legal-review ack
  ARGUS_TELEGRAM_ENABLED:      {{ .Values.argus.connectors.telegram.enabled        | default "false" | quote }}
  ARGUS_TELEGRAM_API_ID:       {{ .Values.argus.connectors.telegram.apiId          | default "" | quote }}
  ARGUS_TELEGRAM_API_HASH:     {{ .Values.argus.connectors.telegram.apiHash        | default "" | quote }}
  ARGUS_TELEGRAM_SESSION_PATH: {{ .Values.argus.connectors.telegram.sessionPath    | default "/var/lib/argus/telegram.session" | quote }}
